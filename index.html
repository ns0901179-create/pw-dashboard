<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Powerwall 制御</title>
    <!-- iOSウェブアプリ設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PW制御">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f8fafc; /* Index.htmlの背景色に合わせる */
        }

        /* 
           GASバナーを隠すためのコンテナ
           Index.html側のpt-[70px]と組み合わせて、バナーを消しつつロゴを綺麗に見せます
        */
        .iframe-container {
            position: absolute;
            top: -50px; 
            left: 0;
            width: 100%;
            height: calc(100% + 50px);
            -webkit-overflow-scrolling: touch;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>

<body>
    <div class="iframe-container">
        <!-- 
            GAS Web Apps の URL を指定します。
            ※デプロイ後の /exec で終わるURLになっていることを確認してください
        -->
        <iframe
            src="https://script.google.com/macros/s/AKfycbxvS8CNbnRnrEuezjRNqjPIijcI0GcCvDim4zbOjwhNND2pk1xwqcKNL1gNF-Cw2ER-nw/exec"
            title="Powerwall 制御ダッシュボード"></iframe>
    </div>
</body>

</html>
