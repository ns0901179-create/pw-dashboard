<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Powerwall 制御</title>
    <!-- iOSウェブアプリ設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PW制御">
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f8fafc;
            /* Index.htmlの背景色に合わせる */
        }

        /* 
           GASバナーを隠しつつ、ステータスバーとの被りを防ぐコンテナ
           （GAS側のpt-[70px]等のパディング追加は不要になります）
        */
        .iframe-container {
            position: absolute;
            /* 時計（ステータスバー）と被らないよう、最低30pxまたはセーフエリア分下げる */
            top: max(30px, env(safe-area-inset-top)); 
            left: 0;
            width: 100%;
            height: calc(100% - max(30px, env(safe-area-inset-top)));
            overflow: hidden;
            -webkit-overflow-scrolling: touch;
        }

        iframe {
            position: absolute;
            top: -44px; /* GASバナー分を上にずらして隠す */
            left: 0;
            width: 100%;
            height: calc(100% + 44px);
            border: none;
            display: block;
        }
    </style>
</head>

<body>
    <div class="iframe-container">
        <!-- 
            GAS Web Apps の URL を指定します。
            ※デプロイ後の /exec で終わるURLになっていることを確認してください
        -->
        <iframe
            src="https://script.google.com/macros/s/AKfycbxvS8CNbnRnrEuezjRNqjPIijcI0GcCvDim4zbOjwhNND2pk1xwqcKNL1gNF-Cw2ER-nw/exec"
            title="Powerwall 制御ダッシュボード"></iframe>
    </div>
</body>

</html>
